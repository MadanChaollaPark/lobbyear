<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LobbyEar · live</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c232c;
    --text: #e6edf3;
    --muted: #9aa7b3;
    --accent: #7ee787;
    --warn: #f0b429;
    --danger: #ff7b72;
    --link: #79c0ff;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui; }
  body { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; border: 1px solid var(--border); margin-right: 6px;
    color: var(--muted); background: var(--panel-2); }
  .badge.running { color: var(--warn); border-color: #f0b42944; }
  .badge.finished{ color: var(--accent); border-color: #7ee78744; }
  .badge.error   { color: var(--danger); border-color: #ff7b7244; }
  .start-form input, .start-form select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); padding: 8px 10px;
    border-radius: 6px; font-size: 13px; width: 100%; }
  .start-form label { display: block; margin: 8px 0 3px; font-size: 12px; color: var(--muted); }
  .start-form button {
    background: var(--accent); color: #0d1117; border: 0; padding: 10px 16px;
    border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .start-form button:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty { color: var(--muted); font-style: italic; }

  .layout { display: grid; grid-template-columns: 1fr 1.4fr 1fr; gap: 12px;
    margin-top: 12px; min-height: 60vh; }
  .layout .col { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
  .layout .col h2 { font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
    margin: 0; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .layout .col .body { padding: 10px 14px; overflow-y: auto; flex: 1; }
  @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }

  .reasoning .entry { padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .reasoning .entry:last-child { border-bottom: 0; }
  .reasoning .ts { color: var(--muted); font-size: 10px; }
  .reasoning .text { color: #d9b87a; font-size: 13px; line-height: 1.4;
    margin-top: 3px; white-space: pre-wrap; }

  .mention { background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 10px;
    animation: pop-in 0.4s ease-out; }
  @keyframes pop-in {
    from { transform: translateY(6px); opacity: 0; }
    to { transform: none; opacity: 1; }
  }
  .mention .head { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .mention .topic { font-weight: 600; margin-top: 6px; font-size: 14px; }
  .mention .quote { border-left: 3px solid var(--accent); padding: 6px 10px;
    margin: 8px 0; font-style: italic; color: #c9d1d9; font-size: 13px;
    background: var(--panel); border-radius: 4px; }
  .mention .why { font-size: 12px; color: #d9b87a; }
  .mention .why b { color: var(--accent); }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 999px;
    font-size: 10px; border: 1px solid var(--border); color: var(--muted);
    background: var(--panel); }
  .pill.sev-high   { color: #ff7b72; border-color: #ff7b7244; }
  .pill.sev-medium { color: #f0b429; border-color: #f0b42944; }
  .pill.sev-low    { color: #7ee787; border-color: #7ee78744; }
  .pill.cat        { color: var(--link); border-color: #79c0ff44; }

  .chiprail { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0;
    border-top: 1px dashed var(--border); margin-top: 8px; }
  .chip { flex: 0 0 auto; padding: 4px 10px; border-radius: 999px;
    font-size: 11px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--muted); display: flex;
    align-items: center; gap: 6px; }
  .chip.pending { color: var(--warn); border-color: #f0b42944; }
  .chip.ok      { color: var(--accent); border-color: #7ee78744; }
  .chip.err     { color: var(--danger); border-color: #ff7b7244; }
  .chip .arg { color: #c9d1d9; max-width: 220px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<header>
  <h1>LobbyEar · live</h1>
  <div class="meta" id="meta">disconnected</div>
</header>

<section id="starter" class="card">
  <div class="start-form">
    <label>Client profile (path on server)</label>
    <input id="f-client" value="clients/example_acme_tobacco.yaml" />
    <label>Video source — pick one</label>
    <input id="f-url" placeholder="https://www.youtube.com/watch?v=…" />
    <input id="f-file" placeholder="/abs/path/to/local.mp4" style="margin-top:6px" />
    <input id="f-videoid" placeholder="existing VideoDB video id" style="margin-top:6px" />
    <button id="f-start">Start run</button>
  </div>
</section>

<section id="status" class="card">
  <span class="badge" id="b-status">idle</span>
  <span class="badge" id="b-runid"></span>
  <div class="chiprail" id="chiprail"></div>
</section>

<section class="layout">
  <div class="col reasoning">
    <h2>Reasoning</h2>
    <div class="body" id="col-reasoning">
      <div class="empty">Agent text blocks will land here as Claude thinks.</div>
    </div>
  </div>
  <div class="col">
    <h2>Mentions</h2>
    <div class="body" id="col-mentions">
      <div class="empty">Mentions will materialize as the agent records them.</div>
    </div>
  </div>
  <div class="col">
    <h2>Raw trace</h2>
    <div class="body" id="col-trace">
      <div class="empty">Every event in stream order.</div>
    </div>
  </div>
</section>

<script>
const $ = (sel) => document.querySelector(sel);
const params = new URLSearchParams(location.search);

const state = {
  runId: params.get("run") || null,
  status: "idle",
  events: [],
  source: null,
};

function setStatus(s) {
  state.status = s;
  const b = $("#b-status");
  b.textContent = s;
  b.className = "badge " + (["running","finished","error"].includes(s) ? s : "");
  $("#meta").textContent = state.runId ? `run ${state.runId} · ${s}` : s;
}

function setRunId(id) {
  state.runId = id;
  $("#b-runid").textContent = id ? `run ${id}` : "";
  const url = new URL(location);
  if (id) url.searchParams.set("run", id); else url.searchParams.delete("run");
  history.replaceState(null, "", url);
}

function nowTime() {
  const d = new Date();
  return d.toTimeString().slice(0, 8);
}

function clearEmpty(root) {
  const e = root.querySelector(".empty");
  if (e) e.remove();
}

function appendTrace(event) {
  const root = $("#col-trace");
  clearEmpty(root);
  const line = document.createElement("div");
  line.style.fontFamily = "ui-monospace, monospace";
  line.style.fontSize = "11px";
  line.style.color = "#c9d1d9";
  line.style.padding = "2px 0";
  line.textContent = `${event.kind || "?"} · ${event.name || "?"} · ${
    JSON.stringify(event.payload || {}).slice(0, 200)
  }`;
  root.appendChild(line);
  root.scrollTop = root.scrollHeight;
}

function appendReasoning(event) {
  const text = ((event.payload || {}).text || "").trim();
  if (!text) return;
  const root = $("#col-reasoning");
  clearEmpty(root);
  const entry = document.createElement("div");
  entry.className = "entry";
  const ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = nowTime();
  const body = document.createElement("div");
  body.className = "text";
  body.textContent = text;
  entry.appendChild(ts);
  entry.appendChild(body);
  root.appendChild(entry);
  root.scrollTop = root.scrollHeight;
}

function fmtTime(s) {
  if (s == null) return "--:--";
  s = Math.round(Number(s) || 0);
  const m = Math.floor(s / 60), r = s % 60;
  return `${String(m).padStart(2,"0")}:${String(r).padStart(2,"0")}`;
}

// Tool_use blocks come in before their tool_result. Cache the input so when
// the matching tool_result for record_mention lands, we can paint the card
// using the input the agent sent (which is the mention itself).
const pendingToolInputs = {};   // turn-name → input
const toolChips = {};           // turn-name → chip DOM node

function summariseToolInput(name, input) {
  if (!input) return "";
  if (name === "search_scenes" || name === "search_spoken") return input.query || "";
  if (name === "compile_clip") return `${(input.shot_ids || []).length} shots`;
  if (name === "record_mention") return input.topic || "";
  if (name === "get_transcript_window") return `${input.start_s}–${input.end_s}s`;
  if (name === "finalize_briefing") return "finalize";
  return JSON.stringify(input).slice(0, 60);
}

function addChip(event) {
  const t = (event.payload || {}).turn;
  const key = `${t}:${event.name}`;
  const rail = $("#chiprail");
  const chip = document.createElement("div");
  chip.className = "chip pending";
  chip.innerHTML = `<span>${event.name}</span><span class="arg">${
    summariseToolInput(event.name, (event.payload || {}).input)
  }</span>`;
  rail.appendChild(chip);
  toolChips[key] = chip;
  rail.scrollLeft = rail.scrollWidth;
}

function settleChip(event) {
  const t = (event.payload || {}).turn;
  const chip = toolChips[`${t}:${event.name}`];
  if (!chip) return;
  chip.classList.remove("pending");
  chip.classList.add(event.payload.is_error ? "err" : "ok");
}

function rememberToolInput(event) {
  const t = (event.payload || {}).turn;
  if (event.name && t != null) pendingToolInputs[`${t}:${event.name}`] = event.payload.input || {};
}

function takeToolInput(event) {
  const t = (event.payload || {}).turn;
  const key = `${t}:${event.name}`;
  const input = pendingToolInputs[key];
  delete pendingToolInputs[key];
  return input || {};
}

function appendMention(input, result) {
  const root = $("#col-mentions");
  clearEmpty(root);
  const card = document.createElement("div");
  card.className = "mention";
  card.innerHTML = `
    <div class="head">
      <span class="pill sev-${input.severity || "medium"}">${(input.severity || "?").toUpperCase()}</span>
      <span class="pill cat">${input.category || "?"}</span>
      <span class="pill">${fmtTime(input.start_s)}–${fmtTime(input.end_s)}</span>
      ${input.speaker_guess ? `<span class="pill">${input.speaker_guess}</span>` : ""}
    </div>
    <div class="topic"></div>
    <div class="quote"></div>
    <div class="why"><b>Why it matters: </b><span></span></div>
  `;
  card.querySelector(".topic").textContent = input.topic || "(no topic)";
  card.querySelector(".quote").textContent = `“${input.transcript_quote || ""}”`;
  card.querySelector(".why span").textContent = input.why_it_matters || "";
  root.appendChild(card);
  root.scrollTop = root.scrollHeight;
}

function handleEvent(event) {
  state.events.push(event);
  appendTrace(event);
  if (event.kind === "text") {
    appendReasoning(event);
  } else if (event.kind === "tool_use") {
    rememberToolInput(event);
    addChip(event);
  } else if (event.kind === "tool_result") {
    settleChip(event);
    if (event.name === "record_mention") {
      const input = takeToolInput(event);
      const result = (event.payload || {}).result || {};
      if (!event.payload.is_error && result.recorded) appendMention(input, result);
    }
  }
}

function attach(runId) {
  if (state.source) state.source.close();
  setRunId(runId);
  setStatus("running");
  const src = new EventSource(`/runs/${runId}/events`);
  state.source = src;
  src.addEventListener("message", (e) => {
    try { handleEvent(JSON.parse(e.data)); } catch {}
  });
  src.addEventListener("done", (e) => {
    let payload = {}; try { payload = JSON.parse(e.data || "{}"); } catch {}
    setStatus(payload.status || "finished");
    src.close();
  });
  src.addEventListener("ping", () => {});
  src.onerror = () => { setStatus("error"); src.close(); };
}

$("#f-start").addEventListener("click", async () => {
  const body = {
    client: $("#f-client").value.trim(),
    url: $("#f-url").value.trim() || null,
    file: $("#f-file").value.trim() || null,
    video_id: $("#f-videoid").value.trim() || null,
  };
  if (!body.url && !body.file && !body.video_id) {
    alert("Provide url, file, or video_id");
    return;
  }
  $("#f-start").disabled = true;
  try {
    const r = await fetch("/runs", {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    const j = await r.json();
    attach(j.run_id);
  } catch (e) {
    alert("Start failed: " + e.message);
  } finally {
    $("#f-start").disabled = false;
  }
});

if (state.runId) attach(state.runId);
else setStatus("idle");
</script>
</body>
</html>
